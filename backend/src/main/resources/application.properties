# Server Configuration
server.port=8080
# server.servlet.context-path=/api

# SQLite Configuration
spring.datasource.url=jdbc:sqlite:nova.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# SQLite requires a single connection to avoid SQLITE_BUSY locking errors
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Security & JWT Configuration
# Secret key must be a base64-encoded string of 256 bits minimum.
nova.jwt.secret=dGhpcy1pcy1hLXNlY3JldC1rZXktZm9yLW5vdmEtYWktYXNzaXN0YW50LXNwcmluZy1ib290LWJhY2tlbmQ=
nova.jwt.expiration-ms=86400000

# AI Configuration (Ollama & Gemini Hybrid)
nova.ollama.base-url=http://localhost:11434
nova.ollama.default-model=gemma3:4b
nova.gemini.default-model=gemini-3-flash-preview

# File Configuration
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Swagger / OpenAPI Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha

# Logging Configuration
logging.level.root=INFO
logging.level.com.nova=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=INFO
